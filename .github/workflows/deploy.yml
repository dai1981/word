name: Deploy to Lolipop

# 「Run workflow」ボタン（ワンボタン）で実行。main への push でも自動実行。
# 自動実行が不要なら、下の push: ブロックを削除してください。
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Python を準備
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: HTML を生成（data/*.json -> word/word/*.html）
        run: python3 generate.py

      - name: ロリポップへ FTP アップロード
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:   ftp.lolipop.jp
          username: lolipop.jp-dp07302908
          password: 2021eigoduke
          protocol: ftps          # うまくいかない場合は ftp に変更
          local-dir: ./word/word/ # 末尾スラッシュ必須
          server-dir: /word/word/ # サーバー側の保存先（実環境に合わせて調整）
